name: Test PR

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Prebuild .velite and .next # require for lint to work properly
        run: pnpm --filter=frontend build

      - name: Run lint
        run: pnpm lint

      - name: Run build
        run: pnpm build
